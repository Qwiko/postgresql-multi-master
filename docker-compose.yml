services:
  pg_node_1:
    image: postgres:18.3-alpine
    container_name: pg_node_1
    environment:
      TZ: Europe/Stockholm
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-U", "admin", "-d", "db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_1_data:/var/lib/postgresql
    # Overriding the default command to enable logical replication
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_wal_senders=10", "-c", "max_replication_slots=10"]

  pg_node_2:
    image: postgres:18.3-alpine
    container_name: pg_node_2
    environment:
      TZ: Europe/Stockholm
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-U", "admin", "-d", "db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_2_data:/var/lib/postgresql
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_wal_senders=10", "-c", "max_replication_slots=10"]


volumes:
  postgres_1_data:
  postgres_2_data: